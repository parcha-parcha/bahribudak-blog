name: Site Quality Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Doğrulama, TypeScript ve Üretim Derlemesi
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Site kalite kontrolünü çalıştır
        run: npm run quality
